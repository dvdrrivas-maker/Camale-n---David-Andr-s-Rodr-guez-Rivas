    <main>
        <h2 class="formulario">Formulario de contacto</h2>

            <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required><br><br>

            <input type="email" id="correo" name="correo" placeholder="alguien@correo.com" required><br><br>
            <label for="fecha">Fecha de nacimiento:</label><br>
            <input type="date" id="fecha" name="fecha" required><br><br>
            <input type="submit" value="Enviar">
        </form>
